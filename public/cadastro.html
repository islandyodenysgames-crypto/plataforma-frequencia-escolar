<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Escola - Carminha</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Mapeamento de variáveis caso o style.css falhe */
        :root {
            --primary-color: #3b82f6;
            --success-color: #10b981;
            --danger-color: #ef4444;
        }
        .gerenciador-grid { display: flex; gap: 2rem; flex-wrap: wrap; }
        .col-principal { flex: 2; min-width: 350px; }
        .col-lateral { flex: 1; min-width: 250px; }
        .linha-transferencia { background: #f1f2f6; padding: 0.5rem; border-radius: 4px; display: flex; gap: 0.5rem; align-items: center; margin-top: 0.5rem; color: #1e293b; }
        .lista-turmas-remover { margin-top: 1rem; list-style: none; padding: 0; }
        
        /* Modificado para comportar os inputs de imagem de forma elegante */
        .lista-turmas-remover li { 
            display: flex; 
            flex-direction: column; 
            align-items: flex-start; 
            background: #f8fafc; 
            padding: 12px; 
            margin-bottom: 12px; 
            border-radius: 6px; 
            border: 1px solid #e2e8f0; 
        }
        
        /* Ajuste visual para os botões de ação na tabela */
        .btn-acao { border: none; padding: 0.4rem 0.8rem; border-radius: 4px; font-size: 0.85rem; font-weight: bold; cursor: pointer; margin-left: 5px; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-content">
            <h2>Escola Carminha 🏫</h2>
            <div class="user-info">
                <button id="btnVoltar" onclick="window.location.href='dashboard.html'" style="cursor: pointer;">← Voltar ao Painel</button>
            </div>
        </div>
    </header>

    <main class="dashboard-container">
        <div class="gerenciador-grid">
            
            <div class="col-principal">
                <section class="area-chamada" style="margin-bottom: 2rem;">
                    <h3>Cadastrar Novo Aluno 🎒</h3>
                    <form id="cadastroAlunoForm">
                        <div class="form-group" style="margin-bottom: 1.2rem;">
                            <label for="nomeAluno">Nome Completo:</label>
                            <input type="text" id="nomeAluno" required placeholder="Ex: Maria Souza Oliveira">
                        </div>
                        <div class="form-group" style="margin-bottom: 2rem;">
                            <label for="selectTurma">Turma:</label>
                            <select id="selectTurma" required onchange="listarAlunosDaTurma(this.value)">
                                <option value="">-- Selecione uma Turma --</option>
                            </select>
                        </div>
                        <button type="submit" id="btnSalvarChamada" style="background-color: var(--primary-color); color: white; border: none; padding: 0.6rem; border-radius: 4px; font-weight: bold; width: 100%; cursor: pointer;">Salvar Aluno</button>
                    </form>
                    <div id="msgFeedback"></div>
                </section>

                <section id="secaoListaAlunos" class="area-chamada" style="display: none;">
                    <h3 id="tituloLista">Alunos Matriculados</h3>
                    <div class="tabela-responsiva">
                        <table>
                            <thead>
                                <tr>
                                    <th>Nome</th>
                                    <th style="text-align: right;">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="corpoListaAlunos"></tbody>
                        </table>
                    </div>
                </section>
            </div>

            <div class="col-lateral">
                <section class="area-chamada">
                    <h3>Gerenciar Turmas 🏫</h3>
                    <form id="cadastroTurmaForm" style="margin-top: 1rem;">
                        <div class="form-group" style="margin-bottom: 1rem;">
                            <label for="nomeTurma">Nova Turma:</label>
                            <input type="text" id="nomeTurma" required placeholder="Ex: 4º Ano C">
                        </div>
                        <button type="submit" style="background-color: var(--success-color); color:white; border:none; padding:0.5rem; width:100%; border-radius:4px; font-weight:bold; cursor:pointer;">+ Criar Turma</button>
                    </form>
                    
                    <ul id="listaTurmasRemover" class="lista-turmas-remover"></ul>
                </section>
            </div>

        </div>
    </main>

    <script>
        const token = localStorage.getItem('token_carminha');
        if (!token) window.location.href = 'index.html';

        let todasAsTurmas = [];

        // 🔄 CARREGAR TODAS AS TURMAS DO BANCO (ATUALIZADA COM SUPORTE À FOTO)
        async function carregarTurmas() {
            try {
                const res = await fetch('https://frequencia-carminha.up.railway.app/api/frequencia/turmas', {
                    headers: { 'x-auth-token': token }
                });
                
                if (!res.ok) {
                    const erroDados = await res.json();
                    throw new Error(erroDados.erro || 'Falha ao buscar dados do servidor.');
                }

                todasAsTurmas = await res.json();
                
                const select = document.getElementById('selectTurma');
                const valorSelecionado = select.value;
                select.innerHTML = '<option value="">-- Selecione uma Turma --</option>';
                
                const listaRemover = document.getElementById('listaTurmasRemover');
                listaRemover.innerHTML = '';

                if (todasAsTurmas.length === 0) {
                    listaRemover.innerHTML = '<li style="color: #7f8c8d; font-size: 0.9rem;">Nenhuma turma cadastrada.</li>';
                } else {
                    todasAsTurmas.forEach(t => {
                        select.innerHTML += `<option value="${t.nome}">${t.nome}</option>`;
                        listaRemover.innerHTML += `
                            <li>
                                <div style="display:flex; justify-content:space-between; width:100%; align-items:center;">
                                    <span><strong>${t.nome}</strong></span>
                                    <button onclick="removerTurma('${t._id}', '${t.nome}')" style="background:none; border:none; color:var(--danger-color); font-weight:bold; cursor:pointer; padding: 5px;">Deletar</button>
                                </div>
                                <div style="display:flex; width:100%; gap:6px; margin-top:10px;">
                                    <input type="text" id="input-foto-${t._id}" value="${t.fotoUrl || ''}" placeholder="Link da foto (URL)" style="flex:1; padding:6px; font-size:0.8rem; border:1px solid #cbd5e1; border-radius:4px;">
                                    <button onclick="salvarFotoTurma('${t._id}')" style="background:#10b981; color:white; border:none; padding:6px 10px; font-size:0.8rem; border-radius:4px; font-weight:bold; cursor:pointer;">Salvar</button>
                                </div>
                            </li>
                        `;
                    });
                }

                if(valorSelecionado) select.value = valorSelecionado;
            } catch (err) { 
                console.error("Erro ao carregar turmas:", err);
                alert("Erro ao sincronizar turmas: " + err.message);
            }
        }

        // 📸 SALVAR/ATUALIZAR FOTO DA TURMA NO BANCO
        async function salvarFotoTurma(id) {
            const urlFoto = document.getElementById(`input-foto-${id}`).value.trim();
            try {
                const res = await fetch(`https://frequencia-carminha.up.railway.app/api/frequencia/turmas/foto/${id}`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-auth-token': token 
                    },
                    body: JSON.stringify({ fotoUrl: urlFoto })
                });

                const dados = await res.json();
                if (!res.ok) throw new Error(dados.erro || 'Erro ao salvar foto.');
                
                alert("Foto da turma salva com sucesso! 📸");
                await carregarTurmas();
            } catch (err) {
                alert(`Erro: ${err.message}`);
            }
        }

        // ➕ CADASTRAR TURMA
        document.getElementById('cadastroTurmaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nomeInput = document.getElementById('nomeTurma');
            const nome = nomeInput.value.trim();
            if(!nome) return;

            try {
                const res = await fetch('https://frequencia-carminha.up.railway.app/api/frequencia/turmas', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-auth-token': token },
                    body: JSON.stringify({ nome })
                });
                const dados = await res.json();
                if(!res.ok) throw new Error(dados.erro || 'Erro ao salvar turma.');
                
                nomeInput.value = '';
                await carregarTurmas();
            } catch(err) { alert(err.message); }
        });

        // 🗑️ REMOVER TURMA
        async function removerTurma(id, nome) {
            if(!confirm(`Excluir a turma "${nome}"? Alunos vinculados a ela não sumirão, mas a turma deixará de listar.`)) return;
            try {
                const res = await fetch(`https://frequencia-carminha.up.railway.app/api/frequencia/turmas/${id}`, {
                    method: 'DELETE',
                    headers: { 'x-auth-token': token }
                });
                if(!res.ok) {
                    const dados = await res.json();
                    throw new Error(dados.erro || 'Erro ao deletar.');
                }
                await carregarTurmas();
                
                if(document.getElementById('selectTurma').value === nome) {
                    document.getElementById('selectTurma').value = "";
                    document.getElementById('secaoListaAlunos').style.display = 'none';
                }
            } catch(err) { alert(err.message); }
        }

        // 🔄 LISTAR ALUNOS
        async function listarAlunosDaTurma(turma) {
            const secao = document.getElementById('secaoListaAlunos');
            const corpo = document.getElementById('corpoListaAlunos');
            if (!turma) { secao.style.display = 'none'; return; }

            document.getElementById('tituloLista').textContent = `Alunos Matriculados no ${turma}`;
            try {
                const res = await fetch(`https://frequencia-carminha.up.railway.app/api/frequencia/alunos/${encodeURIComponent(turma)}`, {
                    headers: { 'x-auth-token': token }
                });
                const alunos = await res.json();
                corpo.innerHTML = '';

                if (alunos.length === 0) {
                    corpo.innerHTML = `<tr><td colspan="2" style="text-align:center; color:#7f8c8d; padding: 15px;">Nenhum aluno ativo nesta turma.</td></tr>`;
                } else {
                    alunos.forEach(aluno => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>
                                <strong>${aluno.nome}</strong>
                                <div id="area-transf-${aluno._id}" style="display:none;" class="linha-transferencia">
                                    <select id="select-transf-${aluno._id}" style="padding: 2px; text-transform: uppercase;"></select>
                                    <button onclick="confirmarTransferencia('${aluno._id}')" style="background:var(--success-color); color:white; border:none; padding:4px 10px; border-radius:3px; cursor:pointer; font-weight:bold;">Mudar</button>
                                    <button onclick="cancelarTransferencia('${aluno._id}')" style="background:#7f8c8d; color:white; border:none; padding:4px 10px; border-radius:3px; cursor:pointer;">X</button>
                                </div>
                            </td>
                            <td style="text-align: right; vertical-align:top; white-space: nowrap;">
                                <button class="btn-acao" onclick="mostrarBarraTransferir('${aluno._id}')" style="background-color: #3498db; color: white;">Transferir</button>
                                <button class="btn-acao" onclick="desativarAluno('${aluno._id}', '${aluno.nome}')" style="background-color: var(--danger-color); color: white;">Remover</button>
                            </td>
                        `;
                        corpo.appendChild(tr);
                    });
                }
                secao.style.display = 'block';
            } catch (err) { console.error(err); }
        }

        // ➕ CADASTRAR ALUNO
        document.getElementById('cadastroAlunoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nomeInput = document.getElementById('nomeAluno');
            const nome = nomeInput.value.trim();
            const turma = document.getElementById('selectTurma').value;
            
            try {
                const res = await fetch('https://frequencia-carminha.up.railway.app/api/frequencia/alunos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-auth-token': token },
                    body: JSON.stringify({ nome, turma })
                });
                if (!res.ok) throw new Error('Erro ao cadastrar aluno.');
                
                nomeInput.value = '';
                listarAlunosDaTurma(turma);
            } catch (error) { alert(error.message); }
        });

        // 🔄 MOSTRAR SELECT DE TRANSFERÊNCIA
        function mostrarBarraTransferir(id) {
            const div = document.getElementById(`area-transf-${id}`);
            const select = document.getElementById(`select-transf-${id}`);
            select.innerHTML = '';
            todasAsTurmas.forEach(t => {
                select.innerHTML += `<option value="${t.nome}">${t.nome}</option>`;
            });
            div.style.display = 'flex';
        }
        
        function cancelarTransferencia(id) { document.getElementById(`area-transf-${id}`).style.display = 'none'; }

        async function confirmarTransferencia(id) {
            const novaTurma = document.getElementById(`select-transf-${id}`).value;
            if(!novaTurma) return alert("Selecione uma turma válida.");
            await executarAtualizacao(id, { turma: novaTurma }, "Aluno transferido com sucesso!");
        }

        // ❌ REMOVER (DESATIVAR) ALUNO
        async function desativarAluno(id, nome) {
            if (!confirm(`Deseja remover o(a) aluno(a) ${nome}?`)) return;
            await executarAtualizacao(id, { ativo: false }, "Aluno removido com sucesso!");
        }

        // 🚀 ENVIAR ATUALIZAÇÃO PARA O BACK-END
        async function executarAtualizacao(id, dados, mensagemSucesso) {
            const turmaAtual = document.getElementById('selectTurma').value;
            try {
                const res = await fetch(`https://frequencia-carminha.up.railway.app/api/frequencia/alunos/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'x-auth-token': token },
                    body: JSON.stringify(dados)
                });
                if (!res.ok) throw new Error("Erro ao atualizar dados no servidor.");
                alert(mensagemSucesso);
                
                listarAlunosDaTurma(turmaAtual);
            } catch (error) { alert(error.message); }
        }

        // Inicialização protegida pós-renderização do DOM
        document.addEventListener('DOMContentLoaded', () => {
            carregarTurmas();
        });
    </script>
</body>
</html>
