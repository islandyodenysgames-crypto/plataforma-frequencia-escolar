<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Frequência - Escola Carminha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="header-content">
            <h2>Escola Carminha 🏫</h2>
            <div class="user-info">
                <button onclick="window.location.href='cadastro.html'" style="background: rgba(255,255,255,0.15); border: none; color: white; padding: 0.4rem 0.8rem; border-radius: 4px; font-weight: bold; cursor: pointer; transition: background 0.2s;">🎒 Cadastrar Alunos/Turmas</button>
                <span>Olá, <strong id="nomeProfessor">Professor</strong></span>
                <button id="btnSair" onclick="logout()">Sair</button>
            </div>
        </div>
    </header>

    <main class="dashboard-container">
        <section class="filtro-chamada">
            <div class="form-group">
                <label for="selectTurma">Selecione a Turma:</label>
                <select id="selectTurma">
                    <option value="">-- Escolha uma Turma --</option>
                </select>
            </div>

            <div class="form-group">
                <label for="inputData">Data da Chamada:</label>
                <input type="date" id="inputData">
            </div>

            <button onclick="carregarAlunos()" id="btnBuscar">Buscar Lista</button>
        </section>

        <section id="areaChamada" class="area-chamada" style="display: none;">
            <h3 id="tituloChamada">Lista de Alunos</h3>
            <div class="tabela-responsiva">
                <table>
                    <thead>
                        <tr>
                            <th>Aluno</th>
                            <th>Presença / Falta</th>
                            <th>Motivo (Se Houver Falta)</th>
                        </tr>
                    </thead>
                    <tbody id="listaAlunosCorpo">
                        </tbody>
                </table>
            </div>
            
            <button onclick="enviarChamada()" id="btnSalvarChamada">Salvar Chamada no Banco</button>
            <div id="msgFeedback"></div>
        </section>
    </main>

    <script>
        const token = localStorage.getItem('token_carminha');
        const nomeProf = localStorage.getItem('usuario_nome');

        if (!token) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('nomeProfessor').textContent = nomeProf;
            document.getElementById('inputData').value = new Date().toISOString().split('T')[0];
            carregarTurmasNoDashboard();
        }

        let alunosCarregados = [];

        // 🏫 BUSCAR TURMAS DO BANCO DE DADOS
        async function carregarTurmasNoDashboard() {
            try {
                const res = await fetch('https://frequencia-carminha.up.railway.app/api/frequencia/turmas', {
                    headers: { 'x-auth-token': token }
                });
                if (!res.ok) throw new Error("Erro ao buscar turmas");
                const turmas = await res.json();
                const select = document.getElementById('selectTurma');
                turmas.forEach(t => {
                    select.innerHTML += `<option value="${t.nome}">${t.nome}</option>`;
                });
            } catch (err) {
                console.error("Erro ao carregar turmas:", err);
            }
        }

        // 🔄 BUSCAR ALUNOS DA TURMA E VERIFICAR HISTÓRICO
        async function carregarAlunos() {
            const turma = document.getElementById('selectTurma').value;
            const dataSelecionada = document.getElementById('inputData').value;
            if (!turma) return alert('Por favor, selecione uma turma!');
            if (!dataSelecionada) return alert('Por favor, selecione uma data!');

            try {
                // 1. Busca os alunos ativos daquela turma
                const respostaAlunos = await fetch(`https://frequencia-carminha.up.railway.app/api/frequencia/alunos/${encodeURIComponent(turma)}`, {
                    method: 'GET',
                    headers: { 'x-auth-token': token }
                });
                if (!respostaAlunos.ok) throw new Error('Erro ao buscar alunos.');
                alunosCarregados = await respostaAlunos.json();

                // 2. Busca se já existe chamada gravada para essa turma nesta data específica
                const respostaHistorico = await fetch(`https://frequencia-carminha.up.railway.app/api/frequencia/historico/${encodeURIComponent(turma)}/${dataSelecionada}`, {
                    method: 'GET',
                    headers: { 'x-auth-token': token }
                });
                const historico = respostaHistorico.ok ? await respostaHistorico.json() : [];

                // 3. Renderiza aplicando os dados encontrados ou o padrão limpo
                renderizarLista(historico);

            } catch (error) {
                alert(error.message);
            }
        }

        // 🎨 RENDERIZAR LISTA NA TELA COBRINDO O HISTÓRICO SALVO
        function renderizarLista(historicoSalvo = []) {
            const corpoTabela = document.getElementById('listaAlunosCorpo');
            const feedback = document.getElementById('msgFeedback');
            corpoTabela.innerHTML = '';
            feedback.textContent = ''; // Limpa mensagens anteriores

            if (alunosCarregados.length === 0) {
                corpoTabela.innerHTML = `<tr><td colspan="3" style="text-align:center;">Nenhum aluno ativo cadastrado nesta turma.</td></tr>`;
                document.getElementById('areaChamada').style.display = 'block';
                return;
            }

            // Se o array de histórico tiver itens, significa que a chamada já foi realizada
            const chamadaJaFeita = historicoSalvo.length > 0;
            if (chamadaJaFeita) {
                feedback.textContent = 'ℹ️ Exibindo chamada já realizada nesta data. Você pode alterá-la e salvar novamente se necessário.';
                feedback.className = 'info-msg';
            }

            alunosCarregados.forEach((aluno, index) => {
                // Procura se este aluno específico tem um registro no histórico recuperado
                const registroSalvo = historicoSalvo.find(h => h.aluno_id === aluno._id);

                if (registroSalvo) {
                    // Restaura o estado salvo do banco de dados
                    aluno.houve_falta = registroSalvo.houve_falta;
                    aluno.motivo_falta = registroSalvo.motivo_falta;
                } else {
                    // Padrão limpo: Todos começam Presentes (houve_falta = false)
                    aluno.houve_falta = false;
                    aluno.motivo_falta = 'NENHUM';
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${aluno.nome}</strong></td>
                    <td>
                        <div class="btn-toggle-group">
                            <button type="button" class="btn-presenca ${!aluno.houve_falta ? 'active' : ''}" id="btn-p-${index}" onclick="definirPresenca(${index}, true)">P</button>
                            <button type="button" class="btn-falta ${aluno.houve_falta ? 'active' : ''}" id="btn-f-${index}" onclick="definirPresenca(${index}, false)">F</button>
                        </div>
                    </td>
                    <td>
                        <select id="motivo-${index}" ${!aluno.houve_falta ? 'disabled' : ''} onchange="mudarMotivo(${index}, this.value)">
                            <option value="NENHUM" ${aluno.motivo_falta === 'NENHUM' ? 'selected' : ''}>Nenhum</option>
                            <option value="DIRETA" ${aluno.motivo_falta === 'DIRETA' ? 'selected' : ''}>Falta Direta</option>
                            <option value="JUSTIFICADA" ${aluno.motivo_falta === 'JUSTIFICADA' ? 'selected' : ''}>Justificada</option>
                            <option value="ATESTADO" ${aluno.motivo_falta === 'ATESTADO' ? 'selected' : ''}>Atestado Médico</option>
                            <option value="ONIBUS" ${aluno.motivo_falta === 'ONIBUS' ? 'selected' : ''}>Problema com Ônibus</option>
                        </select>
                    </td>
                `;
                corpoTabela.appendChild(tr);
            });

            document.getElementById('areaChamada').style.display = 'block';
        }

        // 🔘 ALTERAR PRESENÇA / FALTA (Estilização dos botões)
        function definirPresenca(index, isPresente) {
            const btnP = document.getElementById(`btn-p-${index}`);
            const btnF = document.getElementById(`btn-f-${index}`);
            const selectMotivo = document.getElementById(`motivo-${index}`);

            if (isPresente) {
                btnP.classList.add('active');
                btnF.classList.remove('active');
                selectMotivo.disabled = true;
                selectMotivo.value = 'NENHUM';
                alunosCarregados[index].houve_falta = false;
                alunosCarregados[index].motivo_falta = 'NENHUM';
            } else {
                btnF.classList.add('active');
                btnP.classList.remove('active');
                selectMotivo.disabled = false;
                selectMotivo.value = 'DIRETA';
                alunosCarregados[index].houve_falta = true;
                alunosCarregados[index].motivo_falta = 'DIRETA';
            }
        }

        function mudarMotivo(index, valor) {
            alunosCarregados[index].motivo_falta = valor;
        }

        // 🚀 ENVIAR CHAMADA COMPLETA PRO BANCO
        async function enviarChamada() {
            const dataChamada = document.getElementById('inputData').value;
            const turma = document.getElementById('selectTurma').value;
            const feedback = document.getElementById('msgFeedback');

            const listaFrequencia = alunosCarregados.map(aluno => ({
                aluno_id: aluno._id,
                turma: turma,
                data: dataChamada,
                houve_falta: aluno.houve_falta,
                motivo_falta: aluno.motivo_falta
            }));

            try {
                feedback.textContent = 'Enviando chamada...';
                feedback.className = 'info-msg';

                const resposta = await fetch('https://frequencia-carminha.up.railway.app/api/frequencia/lancar', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-auth-token': token
                    },
                    body: JSON.stringify({ listaFrequencia })
                });

                const dados = await resposta.json();
                
                feedback.textContent = dados.mensagem || dados.erro;
                feedback.className = resposta.ok ? 'sucesso-msg' : 'erro-msg';

                // Recarrega a lista para fixar visualmente as cores salvas
                if(resposta.ok) {
                    setTimeout(() => carregarAlunos(), 1000);
                }

            } catch (error) {
                feedback.textContent = 'Erro de conexão com o servidor.';
                feedback.className = 'erro-msg';
            }
        }

        // 🚪 LOGOUT
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
