<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Mídias e Biblioteca - Escola Carminha</title>
</head>
<body>
    <header style="background: #1e293b; color: white; padding: 1rem;">
        <h2>Central de Mídias e Biblioteca 📚📺</h2>
    </header>

    <main style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px;">
        
        <section style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h3>📺 Controlar Playlist do Telão</h3>
            
            <div style="background: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 2px solid #e2e8f0;">
                <strong style="display: block; margin-bottom: 10px;">⏱️ Tempo das Telas Padrões:</strong>
                <input type="number" id="tempoTelaCampeao" placeholder="Tempo Campeão" style="width: 45%; padding: 5px;">
                <input type="number" id="tempoTelaTabela" placeholder="Tempo Tabela" style="width: 45%; padding: 5px;">
                <button onclick="salvarTemposPadrao()" style="width: 100%; margin-top: 10px; padding: 8px; background: #4f46e5; color: white; border: none; cursor: pointer;">💾 Salvar Tempos</button>
            </div>

            <input type="text" id="midiaTitulo" placeholder="Título" style="width: 100%; margin-bottom: 10px; padding: 8px;">
            <input type="text" id="midiaUrl" placeholder="Link da Mídia" style="width: 100%; margin-bottom: 10px; padding: 8px;">
            <select id="midiaOrientacao" style="width: 100%; margin-bottom: 10px; padding: 8px;">
                <option value="vertical">Vertical (Instagram Padrão)</option>
                <option value="horizontal">Horizontal (16:9)</option>
            </select>
            <input type="number" id="midiaTempo" value="15" style="width: 100%; margin-bottom: 10px; padding: 8px;">
            
            <button onclick="adicionarMidia()" style="background: #22c55e; color: white; width: 100%; padding: 10px; border: none; cursor: pointer;">Adicionar à Playlist</button>

            <h4 style="margin-top: 25px;">Lista de Reprodução Atual</h4>
            <div id="listaPlaylist" style="max-height: 250px; overflow-y: auto;"></div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            buscarPlaylist();
            document.getElementById('tempoTelaCampeao').value = localStorage.getItem('tempoCampeao') || 15;
            document.getElementById('tempoTelaTabela').value = localStorage.getItem('tempoTabela') || 15;
        });

        function salvarTemposPadrao() {
            localStorage.setItem('tempoCampeao', document.getElementById('tempoTelaCampeao').value);
            localStorage.setItem('tempoTabela', document.getElementById('tempoTelaTabela').value);
            alert("Tempos salvos!");
        }

        function detectarTipoEFormatar(url) {
            let urlFormatada = url.trim();
            if (urlFormatada.includes('instagram.com')) {
                if (urlFormatada.includes('?')) urlFormatada = urlFormatada.split('?')[0];
                if (!urlFormatada.endsWith('/')) urlFormatada += '/';
                return { tipo: 'instagram', url: urlFormatada + 'embed' };
            }
            if (urlFormatada.includes('youtube.com/watch?v=') || urlFormatada.includes('youtu.be/')) {
                const videoId = urlFormatada.split(/v=|youtu\.be\//)[1].split('?')[0].split('&')[0];
                return { tipo: 'video', url: `https://www.youtube.com/embed/${videoId}` };
            }
            return { tipo: 'imagem', url: urlFormatada };
        }

        async function buscarPlaylist() {
            const res = await fetch('https://frequencia-carminha.up.railway.app/api/playlist');
            const midias = await res.json();
            const container = document.getElementById('listaPlaylist');
            container.innerHTML = '';
            midias.forEach(item => {
                container.innerHTML += `
                    <div style="padding: 10px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between;">
                        <span>${item.titulo}</span>
                        <button onclick="removerMidia('${item.id}')" style="background:red; color:white; border:none; cursor:pointer;">X</button>
                    </div>`;
            });
        }

        async function removerMidia(id) {
            await fetch(`https://frequencia-carminha.up.railway.app/api/playlist/${id}`, { method: 'DELETE' });
            buscarPlaylist();
        }

        async function adicionarMidia() {
            const midiaTratada = detectarTipoEFormatar(document.getElementById('midiaUrl').value);
            const dados = { 
                tipo: midiaTratada.tipo, 
                titulo: document.getElementById('midiaTitulo').value, 
                url: midiaTratada.url, 
                tempoExibicao: parseInt(document.getElementById('midiaTempo').value),
                orientacao: document.getElementById('midiaOrientacao').value 
            };

            await fetch('https://frequencia-carminha.up.railway.app/api/playlist', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });
            buscarPlaylist();
        }
    </script>
</body>
</html>
