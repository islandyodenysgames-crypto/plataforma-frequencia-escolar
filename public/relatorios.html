<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios de Frequência - Escola Carminha</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ajuste estético para colocar as duas datas lado a lado */
        .bloco-datas-linha {
            display: flex;
            gap: 15px;
            width: 100%;
        }
        .bloco-datas-linha .form-group {
            flex: 1;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-content">
            <h2>Escola Carminha 🏫</h2>
            <div class="user-info">
                <button onclick="window.location.href='dashboard.html'" style="background: rgba(255,255,255,0.15); border: none; color: white; padding: 0.4rem 0.8rem; border-radius: 4px; font-weight: bold; cursor: pointer; transition: background 0.2s;">📅 Voltar ao Painel</button>
                <span>Olá, <strong id="nomeProfessor">Professor</strong></span>
                <button id="btnSair" onclick="localStorage.clear(); window.location.href='index.html';">Sair</button>
            </div>
        </div>
    </header>

    <main class="dashboard-container">
        <section class="filtro-chamada">
            <h3 style="margin-top:0; color:#1e293b;">📊 Gerador de Relatórios por Período</h3>
            <p style="color:#64748b; font-size:0.9rem; margin-bottom:20px;">Escolha a turma e defina o intervalo exato de dias para a análise de assiduidade.</p>

            <div class="form-group">
                <label for="selectTurma">Selecione a Turma:</label>
                <select id="selectTurma">
                    <option value="">-- Escolha uma Turma --</option>
                </select>
            </div>

            <div class="bloco-datas-linha">
                <div class="form-group">
                    <label for="inputDataInicio">Data Inicial:</label>
                    <input type="date" id="inputDataInicio">
                </div>
                <div class="form-group">
                    <label for="inputDataFim">Data Final:</label>
                    <input type="date" id="inputDataFim">
                </div>
            </div>

            <button onclick="gerarRelatorio()" id="btnBuscar" style="width:100%; margin-top:10px;">Gerar Relatório Analítico</button>
        </section>

        <section id="areaRelatorio" class="area-chamada" style="display: none; margin-top:20px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom:2px solid #e2e8f0; padding-bottom:10px;">
                <h3 id="tituloRelatorio" style="margin:0; color:#1e3a8a;">Resultados do Período</h3>
                <button onclick="window.print()" style="background:#475569; color:white; padding:5px 10px; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">🖨️ Imprimir / Salvar PDF</button>
            </div>

            <div class="tabela-responsiva">
                <table>
                    <thead>
                        <tr>
                            <th>Nome do Aluno</th>
                            <th style="text-align:center;">Dias Letivos</th>
                            <th style="text-align:center; color:#16a34a;">Presenças</th>
                            <th style="text-align:center; color:#dc2626;">Faltas</th>
                            <th style="text-align:center;">Assiduidade</th>
                            <th>Principais Motivos de Falta</th>
                        </tr>
                    </thead>
                    <tbody id="corpoRelatorio">
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const token = localStorage.getItem('token_carminha');
        const nomeProf = localStorage.getItem('usuario_nome');

        if (!token) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('nomeProfessor').textContent = nomeProf;
            
            // Define o intervalo padrão automático cobrindo do dia 01 do mês atual até o dia de hoje
            const hoje = new Date();
            const ano = hoje.getFullYear();
            const mes = String(hoje.getMonth() + 1).padStart(2, '0');
            const dia = String(hoje.getDate()).padStart(2, '0');
            
            document.getElementById('inputDataInicio').value = `${ano}-${mes}-01`;
            document.getElementById('inputDataFim').value = `${ano}-${mes}-${dia}`;
            
            carregarTurmas();
        }

        async function carregarTurmas() {
            try {
                const res = await fetch('https://frequencia-carminha.up.railway.app/api/frequencia/turmas', {
                    headers: { 'x-auth-token': token }
                });
                if (!res.ok) throw new Error();
                const turmas = await res.json();
                const select = document.getElementById('selectTurma');
                turmas.forEach(t => {
                    select.innerHTML += `<option value="${t.nome}">${t.nome}</option>`;
                });
            } catch (err) {
                console.error("Erro ao carregar turmas", err);
            }
        }

        async function gerarRelatorio() {
            const turma = document.getElementById('selectTurma').value;
            const dataInicio = document.getElementById('inputDataInicio').value;
            const dataFim = document.getElementById('inputDataFim').value;

            if (!turma) return alert('Por favor, selecione a turma.');
            if (!dataInicio || !dataFim) return alert('Por favor, defina o intervalo completo (Início e Fim).');

            if (new Date(dataInicio) > new Date(dataFim)) {
                return alert('A data inicial não pode ser maior do que a data final!');
            }

            const btn = document.getElementById('btnBuscar');
            try {
                btn.textContent = 'Processando...';
                btn.disabled = true;

                // Requisição atualizada passando os dois parâmetros de data separadamente
                const res = await fetch(`https://frequencia-carminha.up.railway.app/api/frequencia/relatorio/${encodeURIComponent(turma)}/${dataInicio}/${dataFim}`, {
                    headers: { 'x-auth-token': token }
                });

                const dados = await res.json();
                
                btn.textContent = 'Gerar Relatório Analítico';
                btn.disabled = false;

                if (!res.ok) {
                    throw new Error(dados.erro || 'Erro desconhecido no servidor.');
                }

                // Ajusta dinamicamente o cabeçalho impresso com o intervalo escolhido
                const dePartes = dataInicio.split('-');
                const atePartes = dataFim.split('-');
                document.getElementById('tituloRelatorio').textContent = `Período Analisado: ${dePartes[2]}/${dePartes[1]} até ${atePartes[2]}/${atePartes[1]}/${atePartes[0]}`;

                renderizarTabelaRelatorio(dados);
            } catch (err) {
                btn.textContent = 'Gerar Relatório Analítico';
                btn.disabled = false;
                alert(`Erro ao processar relatório: ${err.message}`);
            }
        }

        function renderizarTabelaRelatorio(dados) {
            const corpo = document.getElementById('corpoRelatorio');
            corpo.innerHTML = '';

            if (dados.length === 0) {
                corpo.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#64748b;">Nenhum registro de chamada encontrado para este intervalo de tempo.</td></tr>`;
                document.getElementById('areaRelatorio').style.display = 'block';
                return;
            }

            dados.forEach(item => {
                const tr = document.createElement('tr');
                
                let corFrequencia = '#16a34a';
                let pesoFonte = 'bold';
                if (item.percentualPresenca < 75) {
                    corFrequencia = '#dc2626';
                } else if (item.percentualPresenca < 90) {
                    corFrequencia = '#d97706';
                }

                let motivosTxt = [];
                if (item.motivosDetails.DIRETA > 0) motivosTxt.push(`Direta (${item.motivosDetails.DIRETA})`);
                if (item.motivosDetails.JUSTIFICADA > 0) motivosTxt.push(`Justif. (${item.motivosDetails.JUSTIFICADA})`);
                if (item.motivosDetails.ATESTADO > 0) motivosTxt.push(`Atestado (${item.motivosDetails.ATESTADO})`);
                if (item.motivosDetails.ONIBUS > 0) motivosTxt.push(`Ônibus (${item.motivosDetails.ONIBUS})`);
                
                const resumoMotivos = motivosTxt.length > 0 ? motivosTxt.join(', ') : '<span style="color:#94a3b8; font-style:italic;">Nenhuma falta</span>';

                tr.innerHTML = `
                    <td><strong>${item.nome}</strong></td>
                    <td style="text-align:center; font-weight:500;">${item.totalDias}</td>
                    <td style="text-align:center; color:#16a34a; font-weight:bold;">${item.totalPresencas}</td>
                    <td style="text-align:center; color:#dc2626; font-weight:bold;">${item.totalFaltas}</td>
                    <td style="text-align:center; color:${corFrequencia}; font-weight:${pesoFonte}; font-size:1.05rem;">
                        ${item.percentualPresenca}%
                    </td>
                    <td style="font-size:0.9rem; color:#475569;">${resumoMotivos}</td>
                `;
                corpo.appendChild(tr);
            });

            document.getElementById('areaRelatorio').style.display = 'block';
        }
    </script>
</body>
</html>
