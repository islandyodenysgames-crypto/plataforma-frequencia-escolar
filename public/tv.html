<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Escolar - Escola Carminha</title>
    <style>
        :root {
            --bg-principal: #0f172a;
            --bg-card: #1e293b;
            --bg-item: #111827;
            --texto-claro: #f8fafc;
            --cor-ouro: #eab308;
            --cor-prata: #cbd5e1;
            --cor-bronze: #b45309;
            --cor-sucesso: #4ade80;
            --cor-alerta: #f87171;
            --cor-azul: #38bdf8;
        }
        body { background-color: var(--bg-principal); color: var(--texto-claro); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .resumo-discreto-topo { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 15px 40px; background: var(--bg-card); box-sizing: border-box; border-bottom: 1px solid #334155; font-size: 1.4rem; color: #94a3b8; }
        .tv-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px 40px; text-align: center; box-sizing: border-box; }
        .slide { display: none; width: 100%; height: 100%; animation: fadeIn 0.8s ease-in-out forwards; }
        .slide.ativo { display: flex; flex-direction: column; justify-content: center; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.99); } to { opacity: 1; transform: scale(1); } }
        .podio-container { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .podio-titulo { font-size: 3.2rem; font-weight: 900; color: var(--cor-ouro); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        .secao-campeao-master { background: linear-gradient(135deg, #242217 0%, #111827 100%); border: 4px solid var(--cor-ouro); border-radius: 24px; padding: 30px; display: flex; align-items: center; gap: 40px; max-width: 1200px; width: 95%; margin-bottom: 30px; box-sizing: border-box; animation: pulseGlow 2.5s infinite alternate; }
        .foto-campeao-img { width: 440px; height: 280px; object-fit: cover; border-radius: 16px; border: 3px solid #fef08a; background-color: var(--bg-card); }
        .nome-campeao-grande { font-size: 4rem; font-weight: 900; color: #ffffff; margin: 0; }
        .porcentagem-campeao-grande { font-size: 5rem; font-weight: 900; color: var(--cor-sucesso); margin: 10px 0 0 0; }
        .podio-estrutura-inferior { display: flex; justify-content: center; gap: 40px; width: 100%; max-width: 1200px; }
        .card-sub-podio { background: var(--bg-card); border: 2px solid #334155; border-radius: 16px; padding: 15px 30px; display: flex; align-items: center; gap: 20px; flex: 1; box-sizing: border-box; }
        .card-sub-podio.segundo { border-color: var(--cor-prata); }
        .card-sub-podio.terceiro { border-color: var(--cor-bronze); }
        .sub-turma { font-size: 1.8rem; font-weight: 800; color: white; }
        .sub-porcentagem { font-size: 1.5rem; font-weight: bold; color: var(--cor-sucesso); }
        .titulo-geral { font-size: 2.8rem; margin: 0 0 15px 0; font-weight: 800; }
        .bloco-ranking-unico { background: var(--bg-card); padding: 20px 30px; border-radius: 20px; border-top: 6px solid var(--cor-azul); width: 100%; }
        .ranking-completo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 20px; width: 100%; max-height: 62vh; overflow: hidden; }
        .lista-scroll-tv { display: flex; flex-direction: column; gap: 8px; }
        .ranking-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--bg-item); border-radius: 10px; font-size: 1.4rem; font-weight: 700; border-left: 5px solid #64748b; }
        .ranking-item.ouro { border-left-color: var(--cor-ouro); background: #242217; }
        .ranking-item.prata { border-left-color: var(--cor-prata); }
        .ranking-item.bronze { border-left-color: var(--cor-bronze); }
        .ranking-item .posicao { background: #334155; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin-right: 12px; }
        
        /* CONTAINER DE MÍDIAS */
        .container-midia-dinamica { width: 100%; height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .midia-frame-renderizado { width: 100%; max-width: 1200px; height: 100%; border: none; border-radius: 16px; background: #000; }
        .midia-imagem-renderizada { max-width: 100%; max-height: 75vh; object-fit: contain; border-radius: 16px; }
        .titulo-midia-atual { font-size: 2rem; font-weight: bold; color: var(--cor-azul); margin-bottom: 15px; text-transform: uppercase; }

        /* MÁSCARA INSTAGRAM EXPANDIDA E EQUILIBRADA */
        .instagram-tv-wrapper {
            width: 960px; /* Largura expandida */
            height: 960px; /* Altura expandida */
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
        }
        
        .instagram-tv-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
            border-radius: 12px;
            /* Mantendo a proporção de corte que você aprovou */
            clip-path: inset(45px 0px 130px 0px);
            /* Zoom ajustado para o novo tamanho do contêiner */
            transform: scale(1.15); 
            transform-origin: top center;
        }
    </style>
</head>
<body>

    <div class="resumo-discreto-topo">
        <span id="txtDataAtual">📅 --/--/----</span>
        <span>Mural Digital Escolar 📋</span>
        <span>Frequência Média Geral: <strong id="mediaGeralEscola" style="color: var(--cor-azul);">0%</strong></span>
    </div>
    
    <div class="tv-container">
        <div id="slideCampeao" class="slide ativo">
            <div class="podio-container">
                <div class="podio-titulo">🏆 LÍDER EM ASSIDUIDADE HOJE</div>
                <div class="secao-campeao-master">
                    <img id="podio1_foto" src="" class="foto-campeao-img" onerror="this.src='https://placehold.co/500x300/1e293b/f8fafc?text=Sem+Foto+📸'">
                    <div class="info-campeao-textos">
                        <span class="label-ouro-topo">1º Lugar Geral</span>
                        <h1 id="podio1_nome" class="nome-campeao-grande">--</h1>
                        <h2 id="podio1_porcentagem" class="porcentagem-campeao-grande">--%</h2>
                    </div>
                </div>
                <div class="podio-estrutura-inferior">
                    <div class="card-sub-podio segundo"><div class="sub-textos"><div id="podio2_nome" class="sub-turma">--</div><div id="podio2_porcentagem" class="sub-porcentagem">--%</div></div></div>
                    <div class="card-sub-podio terceiro"><div class="sub-textos"><div id="podio3_nome" class="sub-turma">--</div><div id="podio3_porcentagem" class="sub-porcentagem">--%</div></div></div>
                </div>
            </div>
        </div>

        <div id="slideTabela" class="slide">
            <h1 class="titulo-geral">📊 Classificação Completa</h1>
            <div class="bloco-ranking-unico">
                <div class="ranking-completo-grid">
                    <div id="listaFrequenciaMetade1" class="lista-scroll-tv"></div>
                    <div id="listaFrequenciaMetade2" class="lista-scroll-tv"></div>
                </div>
            </div>
        </div>

        <div id="slideAviso" class="slide">
            <div class="container-midia-dinamica">
                <div id="tituloMidiaPainel" class="titulo-midia-atual">Mural de Avisos</div>
                <div id="wrapperMidiaDinamica" style="width: 100%; display: flex; justify-content: center; height: 100%; align-items: center;"></div>
            </div>
        </div>
    </div>

    <script>
        const hoje = new Date();
        const dataFormatada = `${hoje.getFullYear()}-${String(hoje.getMonth() + 1).padStart(2, '0')}-${String(hoje.getDate()).padStart(2, '0')}`;
        document.getElementById('txtDataAtual').textContent = hoje.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });

        const sequenciaSlides = ['slideCampeao', 'slideTabela', 'slideAviso'];
        let indiceSlideAtual = 0;
        let timerRotacao; 
        let playlistMídias = [];
        let indiceMidiaAtual = 0;

        async function inicializarPainel() {
            await carregarDadosPainel();
            await carregarPlaylistServidor();
            const tempoCampeao = parseInt(localStorage.getItem('tempoCampeao'), 10) || 15;
            agendarProximoSlide(tempoCampeao);
        }

        inicializarPainel();

        setInterval(async () => {
            await carregarDadosPainel();
            await carregarPlaylistServidor();
        }, 3 * 60 * 1000);

        async function carregarPlaylistServidor() {
            try {
                const res = await fetch('https://frequencia-carminha.up.railway.app/api/playlist');
                if (res.ok) playlistMídias = await res.json();
            } catch (err) { console.error(err); }
        }

        async function carregarDadosPainel() {
            try {
                const res = await fetch(`https://frequencia-carminha.up.railway.app/api/frequencia/ranking-diario/${dataFormatada}`);
                if (!res.ok) return;
                const dados = await res.json();
                if (!dados || dados.length === 0) return;

                let somaAproveitamento = 0;
                dados.forEach(t => somaAproveitamento += t.aproveitamento);
                document.getElementById('mediaGeralEscola').textContent = `${Math.round(somaAproveitamento / dados.length)}%`;

                if (dados[0]) {
                    document.getElementById('podio1_nome').textContent = dados[0].turma;
                    document.getElementById('podio1_porcentagem').textContent = `${dados[0].aproveitamento}%`;
                    document.getElementById('podio1_foto').src = dados[0].fotoUrl || 'https://placehold.co/500x300/1e293b/f8fafc?text=' + encodeURIComponent(dados[0].turma);
                }
                document.getElementById('podio2_nome').textContent = dados[1] ? dados[1].turma : '--';
                document.getElementById('podio2_porcentagem').textContent = dados[1] ? `${dados[1].aproveitamento}%` : '--%';
                document.getElementById('podio3_nome').textContent = dados[2] ? dados[2].turma : '--';
                document.getElementById('podio3_porcentagem').textContent = dados[2] ? `${dados[2].aproveitamento}%` : '--%';
                renderizarTodasAsTurmas(dados);
            } catch (err) { console.error(err); }
        }

        function renderizarTodasAsTurmas(dados) {
            const metade1 = document.getElementById('listaFrequenciaMetade1');
            const metade2 = document.getElementById('listaFrequenciaMetade2');
            metade1.innerHTML = ''; metade2.innerHTML = '';
            const meio = Math.ceil(dados.length / 2);
            dados.forEach((item, index) => {
                let classeEstilo = index === 0 ? 'ouro' : index === 1 ? 'prata' : index === 2 ? 'bronze' : item.aproveitamento < 85 ? 'alerta' : '';
                const htmlItem = `<div class="ranking-item ${classeEstilo}"><span class="posicao">${index+1}º</span>${item.turma} <span style="margin-left:auto;">${item.aproveitamento}%</span></div>`;
                if (index < meio) metade1.innerHTML += htmlItem; else metade2.innerHTML += htmlItem;
            });
        }

        function alternarSlides() {
            const slideAtualId = sequenciaSlides[indiceSlideAtual];
            document.getElementById(slideAtualId).classList.remove('ativo');

            indiceSlideAtual = (indiceSlideAtual + 1) % sequenciaSlides.length;
            const proximoSlideId = sequenciaSlides[indiceSlideAtual];
            
            let tempoDePermanencia = 15; 
            if (proximoSlideId === 'slideCampeao') {
                tempoDePermanencia = parseInt(localStorage.getItem('tempoCampeao'), 10) || 15;
            } else if (proximoSlideId === 'slideTabela') {
                tempoDePermanencia = parseInt(localStorage.getItem('tempoTabela'), 10) || 15;
            } else if (proximoSlideId === 'slideAviso') {
                const wrapper = document.getElementById('wrapperMidiaDinamica');
                wrapper.innerHTML = '';

                if (!playlistMídias || playlistMídias.length === 0) {
                    document.getElementById('tituloMidiaPainel').textContent = "Mural de Avisos 📢";
                    wrapper.innerHTML = `<img src="https://placehold.co/1200x600/1e293b/f8fafc?text=Mural+de+Avisos+Livre+📚" class="midia-imagem-renderizada">`;
                    tempoDePermanencia = 15;
                } else {
                    const midia = playlistMídias[indiceMidiaAtual];
                    document.getElementById('tituloMidiaPainel').textContent = midia.titulo;
                    
                    const tempoAlterado = localStorage.getItem(`tempo_midia_${midia.id}`);
                    tempoDePermanencia = parseInt(tempoAlterado, 10) || parseInt(midia.tempoExibicao, 10) || 15;

                    if (midia.tipo === 'instagram') {
                        wrapper.innerHTML = `
                            <div class="instagram-tv-wrapper">
                                <iframe src="${midia.url}" scrolling="no"></iframe>
                            </div>
                        `;
                    } else if (midia.tipo === 'video') {
                        wrapper.innerHTML = `<iframe src="${midia.url}" class="midia-frame-renderizado" allowfullscreen></iframe>`;
                    } else {
                        wrapper.innerHTML = `<img src="${midia.url}" class="midia-imagem-renderizada" onerror="this.src='https://placehold.co/1200x600/1e293b/f8fafc?text=Erro+ao+carregar+imagem+📸'">`;
                    }
                    indiceMidiaAtual = (indiceMidiaAtual + 1) % playlistMídias.length;
                }
            }

            document.getElementById(proximoSlideId).classList.add('ativo');
            agendarProximoSlide(tempoDePermanencia);
        }

        function agendarProximoSlide(segundos) {
            clearTimeout(timerRotacao);
            timerRotacao = setTimeout(alternarSlides, segundos * 1000);
        }
    </script>
</body>
</html>
