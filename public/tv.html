<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Escolar - Escola Carminha</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .tv-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
        }

        .slide {
            display: none;
            width: 100%;
            max-width: 1300px;
            animation: fadeIn 1s ease-in-out forwards;
        }

        .slide.ativo { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.99); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- TELA CAMPEÃO GIGANTE --- */
        .container-campeao {
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
            padding: 20px;
            border-radius: 24px;
            border: 4px solid #eab308; /* Dourado */
            box-shadow: 0 0 50px rgba(234, 179, 8, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .titulo-podio {
            font-size: 3.5rem;
            font-weight: 900;
            color: #eab308;
            margin: 0 0 10px 0;
            text-shadow: 0 0 10px rgba(234,179,8,0.4);
        }

        .nome-turma-campea {
            font-size: 5rem;
            font-weight: 800;
            margin: 5px 0;
            color: #fff;
        }

        .foto-turma-frame {
            width: 100%;
            max-width: 850px;
            height: 480px;
            border-radius: 16px;
            object-fit: cover;
            border: 5px solid #1e293b;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            background-color: #1e293b;
            margin-top: 15px;
        }

        .foto-placeholder {
            max-width: 850px;
            height: 480px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            background: #1e293b;
            color: #64748b;
            border-radius: 16px;
            width: 100%;
            font-style: italic;
        }

        /* --- TELA TABELA COMPLETA --- */
        .ranking-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            width: 100%;
        }

        .coluna-ranking {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #334155;
            text-align: left;
        }

        .ranking-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #111827;
            margin-bottom: 12px;
            border-radius: 12px;
            font-size: 1.8rem;
            font-weight: 600;
        }

        .ranking-item .posicao {
            background: #38bdf8;
            color: #0f172a;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-right: 15px;
            font-size: 1.4rem;
        }

        .resumo-discreto-topo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 15px 40px;
            background: #1e293b;
            box-sizing: border-box;
            border-bottom: 1px solid #334155;
            font-size: 1.3rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="resumo-discreto-topo">
        <span id="txtDataAtual">📅 --/--/----</span>
        <span>Escola Carminha 🏫</span>
        <span>Frequência Média Geral da Escola: <strong id="mediaGeralEscola" style="color: #38bdf8;">0%</strong></span>
    </div>
    
    <div class="tv-container">
        
        <div id="slideCampeao" class="slide ativo">
            <div class="container-campeao">
                <div class="titulo-podio">🏆 1º LUGAR EM FREQUÊNCIA HOJE</div>
                <div id="nomeCampeao" class="nome-turma-campea">CARREGANDO...</div>
                <div id="txtAproveitamentoCampeao" style="font-size: 2.2rem; color: #4ade80; font-weight: bold;">Aproveitamento: --%</div>
                
                <div id="areaFotoCampeao">
                    </div>
            </div>
        </div>

        <div id="slideTabela" class="slide">
            <h1 style="font-size: 2.5rem; margin: 0 0 25px 0;">📊 Classificação Geral de Hoje</h1>
            <div class="ranking-grid">
                <div class="coluna-ranking" style="border-top: 6px solid #4ade80;">
                    <h3 style="color: #4ade80; font-size: 2rem; margin-top:0;">⭐ Top Turmas</h3>
                    <div id="listaTop5"></div>
                </div>
                <div class="coluna-ranking" style="border-top: 6px solid #f87171;">
                    <h3 style="color: #f87171; font-size: 2rem; margin-top:0;">⚠️ Atenção</h3>
                    <div id="listaZ4"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const hoje = new Date();
        const dataFormatada = `${hoje.getFullYear()}-${String(hoje.getMonth() + 1).padStart(2, '0')}-${String(hoje.getDate()).padStart(2, '0')}`;

        document.getElementById('txtDataAtual').textContent = hoje.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });

        carregarDadosPainel();
        setInterval(carregarDadosPainel, 5 * 60 * 1000); // 5 min
        setInterval(alternarSlides, 15 * 1000);          // 15 segundos

        async function carregarPainelDados() {} // Apenas prevenção

        async function carregarDadosPainel() {
            try {
                const res = await fetch(`https://frequencia-carminha.up.railway.app/api/frequencia/ranking-diario/${dataFormatada}`);
                if (!res.ok) throw new Error();
                const dados = await res.json();

                if (dados.length === 0) {
                    mostrarPainelVazio();
                    return;
                }

                // 1. Calcula Média Geral Discreta no Topo
                let somaAproveitamento = 0;
                dados.forEach(t => somaAproveitamento += t.aproveitamento);
                document.getElementById('mediaGeralEscola').textContent = `${Math.round(somaAproveitamento / dados.length)}%`;

                // 2. Renderiza Tela do 1º Lugar (Campeão)
                const campeao = dados[0];
                document.getElementById('nomeCampeao').textContent = campeao.turma;
                document.getElementById('txtAproveitamentoCampeao').textContent = `Assiduidade Premiada: ${campeao.aproveitamento}%`;
                
                const areaFoto = document.getElementById('areaFotoCampeao');
                if (campeao.fotoUrl) {
                    areaFoto.innerHTML = `<img src="${campeao.fotoUrl}" class="foto-turma-frame" alt="Foto da Turma Campeã">`;
                } else {
                    areaFoto.innerHTML = `<div class="foto-placeholder">📸 Sem foto cadastrada para o ${campeao.turma}</div>`;
                }

                // 3. Renderiza Listagem Geral
                renderizarTabelas(dados);

            } catch (err) {
                console.error("Erro ao carregar dados na TV:", err);
            }
        }

        function renderizarTabelas(dados) {
            const listaTop5 = document.getElementById('listaTop5');
            const listaZ4 = document.getElementById('listaZ4');
            listaTop5.innerHTML = '';
            listaZ4.innerHTML = '';

            const melhores = [...dados].slice(0, 5);
            const piores = dados.length > 5 ? [...dados].slice(-4).reverse() : [];

            melhores.forEach((item, index) => {
                listaTop5.innerHTML += `
                    <div class="ranking-item">
                        <div style="display:flex; align-items:center;">
                            <span class="posicao" style="background:#eab308; color:#000;">${index + 1}º</span>
                            <span>${item.turma}</span>
                        </div>
                        <span style="color:#4ade80;">${item.aproveitamento}%</span>
                    </div>
                `;
            });

            if (piores.length > 0) {
                piores.forEach(item => {
                    listaZ4.innerHTML += `
                        <div class="ranking-item">
                            <div style="display:flex; align-items:center;">
                                <span class="posicao" style="background:#f87171;">⚠️</span>
                                <span>${item.turma}</span>
                            </div>
                            <span style="color:#f87171;">${item.aproveitamento}%</span>
                        </div>
                    `;
                });
            } else {
                listaZ4.innerHTML = `<div style="font-size:1.5rem; color:#64748b; text-align:center; padding-top:30px;">Todas as turmas com ótimo rendimento! 🎉</div>`;
            }
        }

        function alternarSlides() {
            const slideA = document.getElementById('slideCampeao');
            const slideB = document.getElementById('slideTabela');

            if (slideA.classList.contains('ativo')) {
                slideA.classList.remove('ativo');
                slideB.classList.add('ativo');
            } else {
                slideB.classList.remove('ativo');
                slideA.classList.add('ativo');
            }
        }

        function mostrarPainelVazio() {
            document.getElementById('nomeCampeao').textContent = "AGUARDANDO CHAMADAS";
            document.getElementById('areaFotoCampeao').innerHTML = `<div class="foto-placeholder">Nenhuma chamada realizada hoje.</div>`;
        }
    </script>
</body>
</html>
