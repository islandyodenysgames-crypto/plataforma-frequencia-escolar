<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Escolar - Escola Carminha</title>
    <style>
        :root {
            --bg-principal: #0f172a;
            --bg-card: #1e293b;
            --bg-item: #111827;
            --texto-claro: #f8fafc;
            --cor-ouro: #eab308;
            --cor-prata: #cbd5e1;
            --cor-bronze: #b45309;
            --cor-sucesso: #4ade80;
            --cor-alerta: #f87171;
            --cor-azul: #38bdf8;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-claro);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .resumo-discreto-topo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 15px 40px;
            background: var(--bg-card);
            box-sizing: border-box;
            border-bottom: 1px solid #334155;
            font-size: 1.4rem;
            color: #94a3b8;
        }

        .tv-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px 40px;
            text-align: center;
            box-sizing: border-box;
        }

        .slide {
            display: none;
            width: 100%;
            height: 100%;
            animation: fadeIn 0.8s ease-in-out forwards;
        }

        .slide.ativo {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.99); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- TELA 1: PODIO DO TOP 3 COM DESTAQUE MÁXIMO E FOTO DO CAMPEÃO --- */
        .podio-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .podio-titulo {
            font-size: 3rem;
            font-weight: 900;
            color: var(--cor-ouro);
            margin-bottom: 20px;
            text-transform: uppercase;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        /* Container da foto da turma campeã acima do primeiro colocado */
        .container-foto-campeao {
            margin-bottom: 25px;
            position: relative;
            animation: pulseGlow 2s infinite alternate;
        }
        .foto-campeao-img {
            width: 220px;
            height: 140px;
            object-fit: cover;
            border-radius: 12px;
            border: 4px solid var(--cor-ouro);
            box-shadow: 0 8px 24px rgba(234, 179, 8, 0.4);
            background-color: var(--bg-card);
        }
        .label-campeao {
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--cor-ouro);
            color: #000;
            font-weight: 900;
            padding: 2px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            text-transform: uppercase;
            white-space: nowrap;
        }

        @keyframes pulseGlow {
            from { transform: scale(1); box-shadow: 0 0 10px rgba(234, 179, 8, 0.2); }
            to { transform: scale(1.03); box-shadow: 0 0 25px rgba(234, 179, 8, 0.5); }
        }

        .podio-estrutura {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 30px;
            width: 100%;
            max-width: 1100px;
            margin-top: 10px;
        }
        .podio-coluna {
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            border: 2px solid #334155;
            border-radius: 20px 20px 0 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            flex: 1;
            transition: all 0.5s ease;
        }
        .podio-coluna.primeiro {
            height: 330px;
            border-color: var(--cor-ouro);
            background: linear-gradient(180deg, #2e2a14 0%, #0f172a 100%);
            box-shadow: 0 0 40px rgba(234, 179, 8, 0.15);
            z-index: 2;
        }
        .podio-coluna.segundo { height: 250px; border-color: var(--cor-prata); }
        .podio-coluna.terceiro { height: 210px; border-color: var(--cor-bronze); }

        .medalha-grande { font-size: 3.5rem; margin-bottom: 10px; }
        .podio-turma { font-size: 2.3rem; font-weight: 800; color: white; word-break: break-all; }
        .podio-porcentagem { font-size: 1.9rem; font-weight: bold; color: var(--cor-sucesso); margin-top: 10px; }

        /* --- TELA 2: LISTA COMPLETA --- */
        .titulo-geral {
            font-size: 2.8rem;
            margin: 0 0 15px 0;
            font-weight: 800;
        }
        .bloco-ranking-unico {
            background: var(--bg-card);
            padding: 20px 30px;
            border-radius: 20px;
            border-top: 6px solid var(--cor-azul);
            width: 100%;
            box-sizing: border-box;
        }
        .ranking-completo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            width: 100%;
            max-height: 62vh;
            overflow-y: hidden;
        }
        .lista-scroll-tv {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .ranking-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: var(--bg-item);
            border-radius: 10px;
            font-size: 1.4rem;
            font-weight: 700;
            border-left: 5px solid #64748b;
        }
        .ranking-item.ouro { border-left-color: var(--cor-ouro); background: #242217; }
        .ranking-item.prata { border-left-color: var(--cor-prata); }
        .ranking-item.bronze { border-left-color: var(--cor-bronze); }
        .ranking-item.alerta { border-left-color: var(--cor-alerta); }

        .ranking-item .posicao {
            background: #334155;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-right: 12px;
            font-size: 1.1rem;
        }
        .detalhes-faltas {
            font-size: 1.1rem;
            color: #94a3b8;
            font-weight: normal;
            margin-left: 15px;
        }

        /* --- TELA 3: BANNER DE AVISOS --- */
        .banner-aviso-img {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 16px;
        }
    </style>
</head>
<body>

    <div class="resumo-discreto-topo">
        <span id="txtDataAtual">📅 --/--/----</span>
        <span>Mural Digital Escolar 📋</span>
        <span>Frequência Média Geral: <strong id="mediaGeralEscola" style="color: var(--cor-azul);">0%</strong></span>
    </div>
    
    <div class="tv-container">
        
        <div id="slideCampeao" class="slide ativo">
            <div class="podio-container">
                <div class="podio-titulo">🏆 LÍDERES EM ASSIDUIDADE HOJE</div>
                
                <div class="container-foto-campeao">
                    <img id="podio1_foto" src="" class="foto-campeao-img" onerror="this.src='https://placehold.co/400x250/1e293b/f8fafc?text=Sem+Foto+📸'" alt="Foto da Turma Campeã">
                    <div class="label-campeao">1º Lugar Geral</div>
                </div>

                <div class="podio-estrutura">
                    
                    <div class="podio-coluna segundo">
                        <div class="medalha-grande">🥈</div>
                        <div id="podio2_nome" class="podio-turma">--</div>
                        <div id="podio2_porcentagem" class="podio-porcentagem">--%</div>
                    </div>

                    <div class="podio-coluna primeiro">
                        <div class="medalha-grande">🥇</div>
                        <div id="podio1_nome" class="podio-turma">--</div>
                        <div id="podio1_porcentagem" class="podio-porcentagem">--%</div>
                    </div>

                    <div class="podio-coluna terceiro">
                        <div class="medalha-grande">🥉</div>
                        <div id="podio3_nome" class="podio-turma">--</div>
                        <div id="podio3_porcentagem" class="podio-porcentagem">--%</div>
                    </div>

                </div>
            </div>
        </div>

        <div id="slideTabela" class="slide">
            <h1 class="titulo-geral">📊 Classificação Completa e Frequência</h1>
            
            <div class="bloco-ranking-unico">
                <div class="ranking-completo-grid">
                    <div id="listaFrequenciaMetade1" class="lista-scroll-tv"></div>
                    <div id="listaFrequenciaMetade2" class="lista-scroll-tv"></div>
                </div>
            </div>
        </div>

        <div id="slideAviso" class="slide">
            <div id="areaBannerAviso">
                <img src="https://frequencia-carminha.up.railway.app/public/banners/aviso_biblioteca.png" class="banner-aviso-img" onerror="this.src='https://placehold.co/1200x600/1e293b/f8fafc?text=Espaço+Reservado+para+Avisos+📚'" alt="Avisos Importantes">
            </div>
        </div>

    </div>

    <script>
        const hoje = new Date();
        const dataFormatada = `${hoje.getFullYear()}-${String(hoje.getMonth() + 1).padStart(2, '0')}-${String(hoje.getDate()).padStart(2, '0')}`;

        document.getElementById('txtDataAtual').textContent = hoje.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });

        const sequenciaSlides = ['slideCampeao', 'slideTabela', 'slideAviso'];
        let indiceSlideAtual = 0;

        carregarDadosPainel();
        setInterval(carregarDadosPainel, 3 * 60 * 1000); // Sincroniza dados a cada 3 minutos
        setInterval(alternarSlides, 15 * 1000);          // Rotaciona a cada 15 segundos

        async function carregarDadosPainel() {
            try {
                const res = await fetch(`https://frequencia-carminha.up.railway.app/api/frequencia/ranking-diario/${dataFormatada}`);
                if (!res.ok) throw new Error();
                const dados = await res.json();

                if (!dados || dados.length === 0) {
                    mostrarPainelVazio();
                    return;
                }

                // 1. Média Global
                let somaAproveitamento = 0;
                dados.forEach(t => somaAproveitamento += t.aproveitamento);
                document.getElementById('mediaGeralEscola').textContent = `${Math.round(somaAproveitamento / dados.length)}%`;

                // 2. Preencher Pódio (Top 3) e injetar a foto recuperada do Banco
                if (dados[0]) {
                    document.getElementById('podio1_nome').textContent = dados[0].turma;
                    document.getElementById('podio1_porcentagem').textContent = `${dados[0].aproveitamento}%`;
                    
                    // Tratamento dinâmico da imagem da TV para o campeão atual
                    const imgCampeao = document.getElementById('podio1_foto');
                    if (dados[0].fotoUrl && dados[0].fotoUrl.trim() !== '') {
                        imgCampeao.src = dados[0].fotoUrl;
                    } else {
                        imgCampeao.src = 'https://placehold.co/400x250/1e293b/f8fafc?text=' + encodeURIComponent(dados[0].turma);
                    }
                } else {
                    document.getElementById('podio1_nome').textContent = '--';
                    document.getElementById('podio1_porcentagem').textContent = '--%';
                    document.getElementById('podio1_foto').src = '';
                }

                document.getElementById('podio2_nome').textContent = dados[1] ? dados[1].turma : '--';
                document.getElementById('podio2_porcentagem').textContent = dados[1] ? `${dados[1].aproveitamento}%` : '--%';

                document.getElementById('podio3_nome').textContent = dados[2] ? dados[2].turma : '--';
                document.getElementById('podio3_porcentagem').textContent = dados[2] ? `${dados[2].aproveitamento}%` : '--%';

                // 3. Renderizar Lista Completa 
                renderizarTodasAsTurmas(dados);

            } catch (err) {
                console.error("Erro na leitura da API:", err);
            }
        }

        function renderizarTodasAsTurmas(dados) {
            const metade1 = document.getElementById('listaFrequenciaMetade1');
            const metade2 = document.getElementById('listaFrequenciaMetade2');
            metade1.innerHTML = '';
            metade2.innerHTML = '';

            const meio = Math.ceil(dados.length / 2);
            
            dados.forEach((item, index) => {
                let classeEstilo = '';
                let iconePosicao = `${index + 1}º`;

                if (index === 0) { classeEstilo = 'ouro'; iconePosicao = '🥇'; }
                else if (index === 1) { classeEstilo = 'prata'; iconePosicao = '🥈'; }
                else if (index === 2) { classeEstilo = 'bronze'; iconePosicao = '🥉'; }
                else if (item.aproveitamento < 85) { classeEstilo = 'alerta'; }

                const faltasTotais = item.totalFaltas || 0;
                const justificadas = item.faltasJustificadas || 0;

                const htmlItem = `
                    <div class="ranking-item ${classeEstilo}">
                        <div style="display:flex; align-items:center;">
                            <span class="posicao">${iconePosicao}</span>
                            <div>
                                <span style="display:block;">${item.turma}</span>
                                <span class="detalhes-faltas">Faltas: <strong style="color:var(--cor-alerta);">${faltasTotais}</strong> | Justificadas: <strong style="color:var(--cor-azul);">${justificadas}</strong></span>
                            </div>
                        </div>
                        <span style="color: ${item.aproveitamento >= 90 ? 'var(--cor-sucesso)' : 'var(--cor-alerta)'}; font-size: 1.6rem;">
                            ${item.aproveitamento}%
                        </span>
                    </div>
                `;

                if (index < meio) {
                    metade1.innerHTML += htmlItem;
                } else {
                    metade2.innerHTML += htmlItem;
                }
            });
        }

        function alternarSlides() {
            document.getElementById(sequenciaSlides[indiceSlideAtual]).classList.remove('ativo');
            indiceSlideAtual = (indiceSlideAtual + 1) % sequenciaSlides.length;
            document.getElementById(sequenciaSlides[indiceSlideAtual]).classList.add('ativo');
        }

        function mostrarPainelVazio() {
            document.getElementById('podio1_nome').textContent = "Sem dados";
            document.getElementById('mediaGeralEscola').textContent = '0%';
            document.getElementById('podio1_foto').src = 'https://placehold.co/400x250/1e293b/f8fafc?text=Aguardando+Chamada+⏳';
        }
    </script>
</body>
</html>
